<!-- =====================================================================
     BLOG PAGINATION SCRIPT

     Post data now lives in js/blog-posts.js — that's the single file
     to edit when adding a new post. This script just handles
     filtering, pagination and rendering the cards.
===================================================================== -->

<script src="js/blog-posts.js"></script>

<script>

    const POSTS_PER_PAGE = 20;
    const MOBILE_POSTS_PER_PAGE = 10;
    const MOBILE_BREAKPOINT = 900;

    function getPostsPerPage() {
        return window.innerWidth <= MOBILE_BREAKPOINT ? MOBILE_POSTS_PER_PAGE : POSTS_PER_PAGE;
    }


    /* -------------------------------------------------------
       Everything below this line is the pagination engine.
       You shouldn't need to touch it — just edit "posts" above.
    ------------------------------------------------------- */

    let currentPage = getPageFromURL();
    let currentTag = getTagFromURL();

    function getPageFromURL() {
        const params = new URLSearchParams(window.location.search);
        const page = parseInt(params.get('page'), 10);
        return (page && page > 0) ? page : 1;
    }

    function getTagFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('tag') || 'all';
    }

    function getFilteredPosts() {
        if (currentTag === 'all') return posts;
        return posts.filter(post => post.tags && post.tags.includes(currentTag));
    }

    function parseDate(dateStr) {
        const [day, month, year] = dateStr.split('-').map(Number);
        return new Date(year, month - 1, day);
    }

    function formatDate(dateStr) {
        const d = parseDate(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }

    function renderPage(page) {
        const grid = document.getElementById('blog-grid');
        grid.innerHTML = '';

        const filteredPosts = getFilteredPosts();
        const perPage = getPostsPerPage();
        const totalPages = Math.max(1, Math.ceil(filteredPosts.length / perPage));
        page = Math.min(Math.max(1, page), totalPages);
        currentPage = page;

        const start = (page - 1) * perPage;
        const pagePosts = filteredPosts.slice(start, start + perPage);

        if (pagePosts.length === 0) {
            const empty = document.createElement('p');
            empty.className = 'blog-empty';
            empty.textContent = 'No posts in this category yet.';
            grid.appendChild(empty);
        }

        pagePosts.forEach(post => {
            const card = document.createElement('a');
            card.href = post.link;
            card.className = 'blog-card';

            const imageWrap = document.createElement('div');
            imageWrap.className = 'blog-card-image';
            const img = document.createElement('img');
            img.src = post.image;
            img.alt = post.title;
            imageWrap.appendChild(img);

            const info = document.createElement('div');
            info.className = 'blog-info';

            const dateEl = document.createElement('span');
            dateEl.className = 'blog-date';
            dateEl.textContent = formatDate(post.date);

            const titleEl = document.createElement('h3');
            titleEl.textContent = post.title;

            const excerptEl = document.createElement('p');
            excerptEl.textContent = post.excerpt;

            const tagsEl = document.createElement('div');
            tagsEl.className = 'blog-tags';
            (post.tags || []).forEach(tag => {
                const tagEl = document.createElement('span');
                tagEl.textContent = tag;
                tagsEl.appendChild(tagEl);
            });

            info.appendChild(dateEl);
            info.appendChild(titleEl);
            info.appendChild(excerptEl);
            info.appendChild(tagsEl);

            card.appendChild(imageWrap);
            card.appendChild(info);
            grid.appendChild(card);
        });

        renderPagination(page, totalPages);

        const url = new URL(window.location);
        if (page === 1) {
            url.searchParams.delete('page');
        } else {
            url.searchParams.set('page', page);
        }
        if (currentTag === 'all') {
            url.searchParams.delete('tag');
        } else {
            url.searchParams.set('tag', currentTag);
        }
        window.history.replaceState({}, '', url);
    }

    function renderPagination(page, totalPages) {
        const el = document.getElementById('pagination');
        el.innerHTML = '';

        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.textContent = '← Previous';
        prevBtn.disabled = page === 1;
        prevBtn.addEventListener('click', () => goToPage(page - 1));

        const label = document.createElement('span');
        label.className = 'page-label';
        label.textContent = `Page ${page} of ${totalPages}`;

        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next →';
        nextBtn.disabled = page === totalPages;
        nextBtn.addEventListener('click', () => goToPage(page + 1));

        el.appendChild(prevBtn);
        el.appendChild(label);
        el.appendChild(nextBtn);
    }

    function goToPage(page) {
        renderPage(page);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderPage(currentPage);

    const tagFilterEl = document.getElementById('tag-filter');
    tagFilterEl.value = currentTag;
    tagFilterEl.addEventListener('change', () => {
        currentTag = tagFilterEl.value;
        renderPage(1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    let resizeTimer;
    let lastPerPage = getPostsPerPage();
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            const nowPerPage = getPostsPerPage();
            if (nowPerPage !== lastPerPage) {
                lastPerPage = nowPerPage;
                renderPage(1);
            }
        }, 200);
    });

</script>


</body>
