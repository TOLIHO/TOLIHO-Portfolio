<!-- =====================================================================
     PORTFOLIO RENDER SCRIPT

     Project data lives in js/portfolio-projects.js - that's the single
     file to edit when adding a new project. This script just renders
     every project as a card, in the order they appear there.
===================================================================== -->

<script src="js/portfolio-projects.js"></script>

<script>

    const portfolioGrid = document.getElementById('portfolio-grid');

    function parseProjectDate(dateStr) {
        const [day, month, year] = dateStr.split('-').map(Number);
        return new Date(year, month - 1, day);
    }

    function formatProjectDate(dateStr) {
        const d = parseProjectDate(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }

    const sortedProjects = [...projects].sort((a, b) => parseProjectDate(b.date) - parseProjectDate(a.date));

    sortedProjects.forEach(project => {
        const card = document.createElement('a');
        card.href = project.link;
        card.className = 'portfolio-card';

        const img = document.createElement('img');
        img.src = project.image;
        img.alt = project.title;

        const info = document.createElement('div');
        info.className = 'portfolio-info';

        const dateEl = document.createElement('span');
        dateEl.className = 'portfolio-date';
        dateEl.textContent = formatProjectDate(project.date);

        const titleEl = document.createElement('h2');
        titleEl.textContent = project.title;

        const excerptEl = document.createElement('p');
        excerptEl.textContent = project.excerpt;

        const tagsEl = document.createElement('div');
        tagsEl.className = 'portfolio-tags';
        (project.tags || []).forEach(tag => {
            const tagEl = document.createElement('span');
            tagEl.textContent = tag;
            tagsEl.appendChild(tagEl);
        });

        info.appendChild(dateEl);
        info.appendChild(titleEl);
        info.appendChild(excerptEl);
        info.appendChild(tagsEl);

        card.appendChild(img);
        card.appendChild(info);

        portfolioGrid.appendChild(card);
    });

</script>
