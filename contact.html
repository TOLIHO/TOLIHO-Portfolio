<!-- ===========================
     CONTACT PAGE
=========================== -->


<section class="contact-page">


<div class="contact-container">


    <p class="eyebrow">
        GET IN TOUCH
    </p>


    <h1>
        Contact Me
    </h1>


    <p class="contact-intro">

        Interested in working together, discussing a project,
        or just want to get in touch?

        Feel free to send me a message below.

    </p>





    <!-- 
        FORM INTEGRATION

        Replace XXXXXXX with your
        Formspree endpoint.

        Example:
        https://formspree.io/f/XXXXXXX

    -->


    <form 
    class="contact-form"
    action="https://formspree.io/f/mbdnlzdd"
    method="POST">


        <div class="form-row">


            <div class="form-group">

                <label for="name">
                    Name
                </label>


                <input
                type="text"
                id="name"
                name="name"
                placeholder="Your name"
                required>

            </div>




            <div class="form-group">

                <label for="email">
                    Email
                </label>


                <input
                type="email"
                id="email"
                name="email"
                placeholder="Your email"
                required>

            </div>


        </div>






        <div class="form-group">


            <label for="subject">
                Subject
            </label>


            <input
            type="text"
            id="subject"
            name="subject"
            placeholder="Message subject">


        </div>






        <div class="form-group">


            <label for="message">
                Message
            </label>


            <textarea
            id="message"
            name="message"
            rows="8"
            placeholder="Your message"
            required></textarea>


        </div>






        <button 
        type="submit"
        class="button">

            Send Message

        </button>



    </form>




</div>


</section>
