<section class="blog-content">

    <!--
    ============================================================

        </p>
    </div>
    -->

    <!--
    ============================================================
    IMAGE BLOCK
    ============================================================

    <div class="blog-image-block">
        <img src="../images/example.jpg" alt="Description">

    </div>
    -->

    <!--
    ============================================================
    QUOTE BLOCK
    ============================================================

    <div class="blog-quote">
        <p>
            “A highlighted quote, thought, or important note.”

    ============================================================
